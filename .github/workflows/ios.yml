name: Build for iOS

on:
  workflow_call:
    inputs:
      tag:
        description: "tag"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "tag"
        required: false
        default: ""
        type: string

jobs:
  build-macos-app:
    name: Release IOS
    runs-on: macos-26
    env:
      RELEASE_TAG: ${{ inputs.tag != '' && inputs.tag || github.event.inputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 iOS
        continue-on-error: true

      - name: Build iOS
        shell: bash
        run: |
          set -euxo pipefail
          flutter build ios --release --no-codesign --config-only --dart-define-from-file=pili_release.json
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath build/ios/derived_data \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build
          rm -rf Payload
          mkdir -p Payload
          cp -R build/ios/derived_data/Build/Products/Release-iphoneos/Runner.app Payload/
          find Payload/Runner.app/Frameworks -type d -name "*.framework" -exec codesign --force --sign - --preserve-metadata=identifier,entitlements {} \;
          zip -r9 "PiliPlus_ios_${{ env.version }}.ipa" Payload/Runner.app

      - name: Release
        if: ${{ env.RELEASE_TAG != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: |
            PiliPlus_ios_*.ipa

      - name: Upload ios release
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: iOS-release
          path: PiliPlus_ios_*.ipa
